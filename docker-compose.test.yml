services:
  db-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fin_ai_test
    ports:
      - "5433:5432"
    volumes:
      - fin_ai_test_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fin_ai_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fin_ai_test_db:
