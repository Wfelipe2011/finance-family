services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fin_ai}
    ports:
      - "6432:5432"
    volumes:
      - fin_ai_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fin_ai}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      target: production
    environment:
      NODE_ENV: development
      PORT: ${SERVER_PORT}
      SERVER_PORT: ${SERVER_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:$${SERVER_PORT}/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      target: production
    environment:
      NODE_ENV: production
      PORT: ${CLIENT_PORT}
      NEXT_PUBLIC_API_BASE_URL: https://api-family.wfelipe.com.br
    ports:
      - "${CLIENT_PORT}:${CLIENT_PORT}"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:$${PORT}/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  fin_ai_db:
